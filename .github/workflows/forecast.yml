name: Forecast Automation

on:
  schedule:
    - cron: '0 * * * *'  # Runs the job every hours
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/forecast.yml'
      - 'script.py'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  run-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      FETCH_DAYS: "730"
      FETCH_RETRIES: "3"
      FETCH_RETRY_SECONDS: "20"
      ALLOW_STALE_OBS: "1"
      BIAS_DECAY_HOURS: "36"
      BIAS_TRAINING_DAYS: "90"
      MIN_BIAS_SAMPLES: "8"
      ARCHIVE_RETENTION_DAYS: "180"
      ECMWF_RUN_HOUR: "6"
      ECMWF_PARAMS: "mx2t3,2t,mn2t3"
      ECMWF_STEPS: "3,6,9,12,15,18,21,24,27,30,33,36,39,42,45,48"

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - uses: actions/setup-python@v5      
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Run Forecast Script
      run: |
        python script.py

    - name: Configure Git
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"

    - name: Pull Latest Changes
      run: |
        git pull --rebase --autostash origin master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and Push Results
      run: |
        git add merged_data_export.csv forecast_Inaquito.html
        git add forecast_output.csv
        git add forecast_archive.csv forecast_verification.csv forecast_metrics.csv
        if git diff --staged --quiet; then
          echo "No forecast changes to commit"
        else
          git commit -m "Updated forecast data"
          git push origin master
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    #- name: Deploy to GitHub Pages
    #  uses: peaceiris/actions-gh-pages@v4
    #  with:
    #    github_token: ${{ secrets.GITHUB_TOKEN }}
    #    publish_dir: ./
