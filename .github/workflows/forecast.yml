name: Forecast Automation

on:
  schedule:
    - cron: '0 * * * *'  # Runs the job every hours
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/forecast.yml'
      - 'script.py'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  run-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      MODEL_TRAINING_HOURS: "720"
      SARIMAX_MAXITER: "50"
      LSTM_EPOCHS: "10"
      LSTM_BATCH_SIZE: "32"
      FETCH_DAYS: "730"

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - uses: actions/setup-python@v5      
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Run Forecast Script
      run: |
        python script.py

    - name: Configure Git
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"

    - name: Pull Latest Changes
      run: |
        git pull --rebase --autostash origin master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and Push Results
      run: |
        git add merged_data_export.csv forecast_Inaquito.html
        if git diff --staged --quiet; then
          echo "No forecast changes to commit"
        else
          git commit -m "Updated forecast data"
          git push origin master
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    #- name: Deploy to GitHub Pages
    #  uses: peaceiris/actions-gh-pages@v4
